# PER-8195 Phase 1 — Selenium-Python matrix-row mapping (STUB).
# Test code in tests/advanced.py — TO BE WRITTEN.

sdk: selenium-python
package: percy-selenium
language: python
sdk_min_version: '2.1.2'
cli_min_version: '1.31.10'

rows:
  - id: widths
    state: planned
    test: 'TodoMVC Advanced > exercises widths'
  - id: min_height
    state: planned
    test: 'TodoMVC Advanced > exercises minHeight'
  - id: enable_javascript
    state: planned
    test: 'TodoMVC Advanced > exercises enable_javascript'
  - id: responsive_snapshot_capture
    state: planned
    test: 'TodoMVC Advanced > exercises responsive_snapshot_capture (also via camelCase alias)'
  - id: readiness_preset
    state: planned
    test: 'TodoMVC Advanced > exercises readiness preset (balanced, strict, disabled)'
  - id: sync
    state: planned
    test: 'TodoMVC Advanced > exercises sync option'
  - id: percy_css
    state: planned
    test: 'TodoMVC Advanced > exercises percyCSS via .percy.yml'

  # Python-specific.
  - id: snake_case_camelcase_dual_naming
    state: planned
    test: 'TodoMVC Advanced > exercises both responsive_snapshot_capture and responsiveSnapshotCapture (same option, dual naming)'
  - id: cross_origin_iframe_handling
    state: covered
    test: 'automatic via percy-selenium >= 2.1.2'

  # Options not exposed as kwargs in percy-selenium (per SDK source).
  - id: scope
    state: n_a
    reason: 'Not exposed in percy-selenium 2.1.2 kwargs surface.'
  - id: dom_transformation
    state: n_a
    reason: 'Not exposed in percy-selenium 2.1.2 kwargs surface.'
  - id: regions
    state: n_a
    reason: 'create_region helper exists for Automate; not used in DOM snapshot path in 2.1.2.'
  - id: discovery
    state: n_a
    reason: 'discovery is per-build, not per-snapshot in this SDK.'

  - id: labels
    state: planned
  - id: test_case
    state: planned
  - id: device_pixel_ratio
    state: planned
  - id: browsers
    state: planned
  - id: disable_shadow_dom
    state: planned
  - id: enable_layout
    state: planned

  - id: env_percy_server_address
    state: planned
    test: 'CI: advanced job sets PERCY_SERVER_ADDRESS via env (Python reads PERCY_CLI_API)'
  - id: percy_yml_global_config
    state: planned
    test: 'global config consumed via .percy.yml'
  - id: environment_info_reporting
    state: covered
    test: 'automatic via percy-selenium client info'

